<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Corevo — bokningsvarianter (mobil-först)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style> * { box-sizing: border-box; } html, body { margin: 0; padding: 0; height: 100%; } </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="core.js"></script>
<script type="text/babel" src="../icons.jsx"></script>
<script type="text/babel" src="../design-canvas.jsx"></script>
<script type="text/babel" src="frames.jsx"></script>
<script type="text/babel" src="variants.jsx"></script>
<script type="text/babel" src="desktop.jsx"></script>
<script type="text/babel">
const MOBILE = [
  ["m-inline", "1 · Inline-sektion", "Allt i ett svep, stegen under varandra", VInline],
  ["m-drawer", "2 · Drawer / overlay", "Sheet upp, sidan kvar bakom", VDrawer],
  ["m-wizard", "3 · Steg-för-steg", "En sak per skärm, störst touch-ytor", VWizard],
  ["m-compact", "4 · Kompakt en-sida", "Alla val synliga — snabbast för vana", VCompact],
];
const DESKTOP = [
  ["d-inline", "1 · Inline-sektion", "Bokning inbäddad i sidflödet", DeskInline],
  ["d-drawer", "2 · Drawer / overlay", "Sidopanel, sidan dimmad bakom", DeskDrawer],
  ["d-wizard", "3 · Steg-för-steg", "Centrerat kort över sidan", DeskWizard],
  ["d-compact", "4 · Kompakt en-sida", "Bred panel, allt synligt", DeskCompact],
];
function App() {
  return (
    <DesignCanvas>
      <DCSection id="mobil" title="Bokningsvarianter — mobil" subtitle="99% av bokningarna sker på mobil — detta är det viktigaste. Alla 4 är klickbara: välj tjänst, frisör, dag/tid. Viktig knapp alltid i nederkant (tumläge).">
        {MOBILE.map(([id, label, sub, Comp]) => (
          <DCArtboard key={id} id={id} label={label + " — " + sub} width={414} height={826}>
            <Phone><Comp /></Phone>
          </DCArtboard>
        ))}
        <DCPostIt id="rec" x={10} y={10} color="#FBEBCB">
          <b>Min rekommendation för mobil:</b> Variant 3 (steg-för-steg). Med 99% mobil vinner störst touch-ytor och en sak per skärm — minst att tänka på, svårast att göra fel, och summan/CTA sitter alltid i tumläge. Variant 4 (kompakt) som genväg för vana stamkunder. Variant 2 (drawer) är finast när bokningen ska kännas "inne i sidan" på desktop.
        </DCPostIt>
      </DCSection>
      <DCSection id="desktop" title="Bokningsvarianter — desktop" subtitle="Samma flöde inbäddat i salongens sida (aldrig en extern portal). Samma header/brand syns hela tiden.">
        {DESKTOP.map(([id, label, sub, Comp]) => (
          <DCArtboard key={id} id={id} label={label + " — " + sub} width={1200} height={760}>
            <div style={{ position: "relative", width: "100%", height: "100%", overflow: "hidden" }}><Comp /></div>
          </DCArtboard>
        ))}
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
