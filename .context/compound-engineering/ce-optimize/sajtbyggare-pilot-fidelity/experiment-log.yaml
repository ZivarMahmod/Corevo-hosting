# ── CP-2 HYPOTHESIS BACKLOG (ordered by fidelity impact; serial loop takes top runnable, <=4 first run) ──
# Restoran fidelity is CUMULATIVE (additive), so the loop is "each experiment stacks on the current
# best and is KEPT only if mean_fidelity rises + gates pass" — the emerging winning PATTERN
# (manifest shape + section-authoring + asset handling + css scoping) is what feeds the goal-36 build loop.
hypothesis_backlog:
  - description: >
      Full editable copy: reproduce ALL 8 vendor sections faithfully (add the missing service,
      about, menu, team, testimonial + the real footer) AND author manifest/restoran.ts declaring
      DRY-linked editable regions (mirror manifest/salvia.ts). Jumps section_coverage 0.375->~1.0
      and editable_regions 0->N (clears the editability gate). The keystone experiment.
    category: fidelity-coverage
    priority: high
    dep_status: approved
    required_deps: []
  - description: >
      Self-host the vendor's webfont (Heebo) + the icon set (Font Awesome glyphs used in nav/hero/
      sections) as LOCAL assets under public/sajtbyggare/restoran/ (no CDN, CSP-safe) so typography
      and icons render faithfully instead of falling back. Recovers a visible static-mode fidelity gap
      WITHIN the no-CDN rule.
    category: assets-fidelity
    priority: high
    dep_status: approved
    required_deps: []
  - description: >
      Reproduce the vendor RESERVATION section's real layout (section-title eyebrow + h1, form + side
      media/map split, dark panel) and style the woven booking module native to that block — raise
      module_integration without touching booking-mount internals (placement/styling only).
    category: module-integration
    priority: medium
    dep_status: approved
    required_deps: []
  - description: >
      Scope the vendor CSS under [data-tenant]/.corevo-tpl-scope (prefix Bootstrap globals) so the
      template's styles can't leak/clash when many templates coexist — correctness for multi-template
      and guards against token bleed. Fidelity-neutral-to-positive.
    category: css-scoping
    priority: medium
    dep_status: approved
    required_deps: []
  - description: >
      Extract restoran copy/media into a theme-content source so editable-region defaults DRY-link
      (never re-typed) — matches salvia's drift-proof pattern; makes exact_token/exact-copy structurally
      enforced. May fold into the keystone experiment.
    category: architecture
    priority: low
    dep_status: approved
    required_deps: []

