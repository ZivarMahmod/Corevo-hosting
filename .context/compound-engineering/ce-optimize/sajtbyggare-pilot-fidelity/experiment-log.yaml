      exact_token_mismatches scanned EVERY manifest region default as a font-family token,
      so text defaults (headings/copy) + image defaults (asset paths) were flagged as
      "not in vendor CSS" -> 12 false mismatches on exp1. The adversarial verifier only
      validated the baseline (no manifest), so the bug was latent until the first manifest landed.
    fix: >
      Scan ONLY color/font region defaults (the token-bearing types): color -> hex literal,
      font -> font-family value. Baseline unaffected (no manifest -> loop skipped -> still 0),
      so the metric stays comparable. Real color/font tokens still gated (hex + computed-style).
    verified: "exp1 exact_token_mismatches 12 -> 0; drop-to-exactly-0 proves all 12 were the text/image false flags."

