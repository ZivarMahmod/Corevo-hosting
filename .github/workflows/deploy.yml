name: Deploy

# CD (G11). Builds Next→Cloudflare via OpenNext and deploys the Worker. Staging
# pushes migrations; production migrations are reviewed/applied out-of-band and
# guarded by an explicit schema checkpoint before a Worker can be built.
#
#   push tag v*          → PRODUCTION (gated)     worker: bokningsplatformen
#   workflow_dispatch    → choose target manually (staging | production)
#
# NOTHING auto-deploys on a push to main. Staging is MANUAL ONLY (no staging
# Supabase project exists yet — auto-on-push failed every push). Run it from the
# Actions tab ("Run workflow" → target: staging) once staging secrets exist.
# Production NEVER auto-deploys: it requires a tag or a manual run, AND the
# `production` GitHub Environment approval gate.
#
# OpenNext bundling runs here on Linux on purpose — the local Windows bundle hits
# an EPERM symlink error (live-blocker #3); `next build` itself is green either way.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

defaults:
  run:
    working-directory: 5-Kod

jobs:
  # ── STAGING ────────────────────────────────────────────────────────────────
  staging:
    name: deploy staging
    runs-on: ubuntu-latest
    # MANUAL ONLY — never auto-runs on push. Needs a staging Supabase project +
    # secrets that don't exist yet; auto-on-main failed every push (G11 ops-pending).
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.target == 'staging' &&
      vars.ISOLATED_STAGING_READY == 'true'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: 5-Kod/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile

      # 1) Supabase migrations → staging project
      - uses: supabase/setup-cli@v1
        with: { version: 2.109.1 }
      - name: Push migrations (staging)
        working-directory: 5-Kod # contains supabase/ (config.toml + migrations)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ secrets.STAGING_SUPABASE_PROJECT_REF }}"
          supabase db push

      - name: Verify staging migration history parity
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}
        run: |
          supabase migration list --linked > "$RUNNER_TEMP/staging-migrations.txt"
          node scripts/verify-database-release.mjs \
            --expected-latest 0121 \
            --required-test-versions 0092,0093,0094,0095,0096,0097,0098,0099,0100,0101,0102,0103,0104,0105,0106,0107,0108,0109,0110,0111,0112,0113,0114,0115,0116,0117,0118,0119,0120,0121 \
            --history-file "$RUNNER_TEMP/staging-migrations.txt" \
            --history-side remote

      # 2) OpenNext build — NEXT_PUBLIC_* inlined at build time (live-blocker #1)
      - name: Build (OpenNext, staging env)
        run: pnpm --filter @corevo/web exec opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_ROOT_DOMAIN: corevo.se
          NEXT_PUBLIC_PLATFORM_HOST: booking.corevo.se
          NEXT_PUBLIC_TENANT_MODE: live
          NEXT_PUBLIC_SITE_URL: https://bokningsplatformen-staging.${{ secrets.CF_WORKERS_SUBDOMAIN }}.workers.dev
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}

      - name: Enforce Worker gzip budget (staging)
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          STAGING_R2_PUBLIC_BASE_URL: ${{ secrets.STAGING_R2_PUBLIC_BASE_URL }}
        run: |
          set -o pipefail
          pnpm --filter @corevo/web exec wrangler deploy --env staging --dry-run \
            --var "NEXT_PUBLIC_SUPABASE_URL:$STAGING_SUPABASE_URL" \
            --var "NEXT_PUBLIC_SUPABASE_ANON_KEY:$STAGING_SUPABASE_ANON_KEY" \
            --var "R2_PUBLIC_BASE_URL:$STAGING_R2_PUBLIC_BASE_URL" \
            --outdir "$RUNNER_TEMP/worker-bundle" 2>&1 | tee "$RUNNER_TEMP/wrangler-dry-run.txt"
          node scripts/check-worker-bundle.mjs \
            --input "$RUNNER_TEMP/wrangler-dry-run.txt" \
            --max-gzip-bytes 3145728

      # 3) Deploy Worker (staging). Secrets are pre-set via `wrangler secret put`.
      - name: Deploy (wrangler --env staging)
        run: >-
          pnpm --filter @corevo/web exec wrangler deploy --env staging
          --var "NEXT_PUBLIC_SUPABASE_URL:$STAGING_SUPABASE_URL"
          --var "NEXT_PUBLIC_SUPABASE_ANON_KEY:$STAGING_SUPABASE_ANON_KEY"
          --var "R2_PUBLIC_BASE_URL:$STAGING_R2_PUBLIC_BASE_URL"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          STAGING_R2_PUBLIC_BASE_URL: ${{ secrets.STAGING_R2_PUBLIC_BASE_URL }}

  # ── PRODUCTION ───────────────────────────────────────────────────────────────
  verify-production-ci:
    name: verify same-SHA release CI
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    steps:
      - name: Require successful main CI for exact deployment SHA
        # Ingen checkout i det här jobbet — workflow-defaulten working-directory:
        # 5-Kod finns inte på disk och får bash-processen att krascha innan
        # grinden ens utvärderas. gh api behöver inga repofiler.
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh api \
            --method GET \
            "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" \
            -f head_sha="$GITHUB_SHA" \
            -f per_page=100 \
            --jq '[.workflow_runs[] | select(.head_branch == "main" and .status == "completed" and .conclusion == "success")] | length')
          [ "$count" -gt 0 ] || {
            echo "::error::No successful main CI with all configured release gates exists for $GITHUB_SHA"
            exit 1
          }

  production:
    name: deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify-production-ci
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    environment: production # ← approval gate; configure required reviewers in repo settings
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: 5-Kod/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile

      # Migrationer körs OUT-OF-BAND (via Supabase MCP / manuellt med granskning),
      # INTE i CI — undviker dubbelt DB-ägarskap + tar bort behovet av Supabase-secrets.
      # En ensam versionsvariabel räcker inte. Den versionsbundna checkpoint-filen
      # måste också visa att historik och schema har verifierats av en operatör.
      # Checkpointen är versions- och fingerprintbunden; deployen failar stängt om
      # repo, granskad produktionshistorik och GitHub-variabel inte beskriver samma schema.
      - name: Verify production database migration checkpoint
        env:
          PROD_DB_MIGRATION: ${{ vars.PROD_DB_MIGRATION }}
        run: >-
          node scripts/verify-database-release.mjs
          --expected-latest 0121
          --required-test-versions 0092,0093,0094,0095,0096,0097,0098,0099,0100,0101,0102,0103,0104,0105,0106,0107,0108,0109,0110,0111,0112,0113,0114,0115,0116,0117,0118,0119,0120,0121
          --production-checkpoint docs/ops/production-schema-checkpoint.json
          --declared-latest "$PROD_DB_MIGRATION"

      - name: Build (OpenNext, production env)
        run: pnpm --filter @corevo/web exec opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_ROOT_DOMAIN: corevo.se
          NEXT_PUBLIC_PLATFORM_HOST: booking.corevo.se
          NEXT_PUBLIC_TENANT_MODE: live
          NEXT_PUBLIC_SITE_URL: https://booking.corevo.se
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}

      - name: Enforce Worker gzip budget (production)
        run: |
          set -o pipefail
          pnpm --filter @corevo/web exec wrangler deploy --dry-run \
            --outdir "$RUNNER_TEMP/worker-bundle" 2>&1 | tee "$RUNNER_TEMP/wrangler-dry-run.txt"
          node scripts/check-worker-bundle.mjs \
            --input "$RUNNER_TEMP/wrangler-dry-run.txt" \
            --max-gzip-bytes 3145728

      - name: Require delivery secrets and set Worker runtime secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BOOKING_PIN_PEPPER: ${{ secrets.BOOKING_PIN_PEPPER }}
          GIADA_SMS_BASE_URL: ${{ secrets.GIADA_SMS_BASE_URL }}
          GIADA_SMS_API_KEY: ${{ secrets.GIADA_SMS_API_KEY }}
        run: |
          test -n "$BOOKING_PIN_PEPPER"
          test -n "$GIADA_SMS_BASE_URL"
          test -n "$GIADA_SMS_API_KEY"
          pnpm --filter @corevo/web exec wrangler secret list --format json > "$RUNNER_TEMP/worker-secrets.json"
          node -e "const s=require(process.argv[1]); for (const n of ['EMAIL_RELAY_URL','EMAIL_RELAY_SECRET']) if (!s.some(x=>x.name===n)) throw Error('missing '+n)" "$RUNNER_TEMP/worker-secrets.json"
          printf '%s' "$BOOKING_PIN_PEPPER" | pnpm --filter @corevo/web exec wrangler secret put BOOKING_PIN_PEPPER
          printf '%s' "$GIADA_SMS_BASE_URL" | pnpm --filter @corevo/web exec wrangler secret put GIADA_SMS_BASE_URL
          printf '%s' "$GIADA_SMS_API_KEY" | pnpm --filter @corevo/web exec wrangler secret put GIADA_SMS_API_KEY

      # fix-35 — deploy via deploy-prod.mjs, NOT bare `wrangler deploy`. Customer domains
      # now live in COMMITTED wrangler.jsonc (top-level routes[], alongside the 3 fixed
      # back-office hosts + the *.boka wildcard), so deploying that file re-asserts every
      # one and can never detach it. The script runs a fail-closed VALIDATOR
      # (gen-deploy-config.mjs: committed ⊇ live + active; the live⊆file guard needs the
      # token below and is hard-required for a real publish), asserts all fixed routes,
      # dry-runs, then deploys wrangler.jsonc directly (no DB-generated -c config).
      # NOTE (ops): CLOUDFLARE_API_TOKEN must also carry **Zone → DNS → Edit** on the
      # corevo.se zone so a NEW <slug>.corevo.se custom_domain gets its DNS record + cert
      # (Workers Scripts/Routes:Edit alone can 403 on first attach).
      - name: Deploy (production via deploy-prod.mjs — committed wrangler.jsonc routes)
        run: pnpm --filter @corevo/web exec node scripts/deploy-prod.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Faila deploy-runnen synligt om routning eller den publika login-dörren är
      # trasig efter publiceringen. Ingen automatisk rollback görs här.
      - name: Post-deploy smoke
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
        run: |
          node apps/web/scripts/check_domains.mjs
          body=$(curl --silent --show-error --fail --max-time 30 https://booking.corevo.se/login)
          echo "$body" | grep -qi "logga in" || { echo "::error::login-sidan renderar inte"; exit 1; }
