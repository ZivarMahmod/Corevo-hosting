name: CI

# PR gate (G11). lint + typecheck + unit + contract acceptance + build always block the PR.
# Full Playwright E2E runs against a seeded STAGING Supabase and is gated on the
# repo variable E2E_ENABLED=true (set it once staging secrets exist) so that an
# unconfigured repo skips E2E instead of red-washing every PR.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: 5-Kod

jobs:
  database:
    name: migrations · SQL/RLS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - name: Verify migration and SQL test inventory
        run: >-
          node scripts/verify-database-release.mjs
          --expected-latest 0120
          --required-test-versions 0092,0093,0094,0095,0096,0097,0098,0099,0100,0101,0102,0103,0104,0105,0106,0107,0108,0109,0110,0111,0112,0113,0114,0115,0116,0117,0118,0119,0120
      # Local disposable stack: migrations + seed are applied before the SQL
      # suites run. No production/staging credentials or data are used.
      - name: Start disposable Supabase (fresh 0001-latest)
        run: supabase start
      - name: Prove fresh database migration history
        run: |
          supabase migration list --local > "$RUNNER_TEMP/local-migrations.txt"
          node scripts/verify-database-release.mjs \
            --expected-latest 0120 \
            --required-test-versions 0092,0093,0094,0095,0096,0097,0098,0099,0100,0101,0102,0103,0104,0105,0106,0107,0108,0109,0110,0111,0112,0113,0114,0115,0116,0117,0118,0119,0120 \
            --history-file "$RUNNER_TEMP/local-migrations.txt" \
            --history-side remote
      # These files are fail-fast procedural SQL suites, not TAP output. Running
      # them through `supabase test db` became invalid when the CLI switched to
      # pg_prove ("No plan found"), even though every SQL assertion succeeded.
      - name: Run procedural database and RLS tests
        shell: bash
        run: |
          mapfile -t db_containers < <(docker ps --filter "name=supabase_db_" --format '{{.Names}}')
          [ "${#db_containers[@]}" -eq 1 ] || {
            echo "::error::Expected exactly one local Supabase database container"
            printf '%s\n' "${db_containers[@]}"
            exit 1
          }
          db_container="${db_containers[0]}"
          for sql_test in supabase/tests/*_test.sql; do
            echo "::group::$sql_test"
            docker exec -i "$db_container" psql -X -v ON_ERROR_STOP=1 -U postgres -d postgres < "$sql_test"
            echo "::endgroup::"
          done

  quality:
    name: lint · typecheck · unit · contract acceptance · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: 5-Kod/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Each gate runs even if an earlier one failed (if: !cancelled()), so ONE red
      # gate never hides the others — the job still fails if any gate fails. (Before:
      # a lint crash aborted the job and typecheck/test/build never ran at all.)
      - run: pnpm lint
        if: ${{ !cancelled() }}
      - run: pnpm typecheck
        if: ${{ !cancelled() }}
      - run: pnpm test
        if: ${{ !cancelled() }}
      - name: Test release and scheduler scripts
        if: ${{ !cancelled() }}
        run: >-
          node --test
          scripts/verify-database-release.test.mjs
          scripts/check-worker-bundle.test.mjs
          apps/web/scripts/primary-scheduler.test.mjs
          apps/web/scripts/primary-scheduler-config.test.mjs
      - run: pnpm test:acceptance:contract
        if: ${{ !cancelled() }}
      # Bransch-vakten (goal-61): failar på NYA hårdkodade bransch-ord (salong/frisör/
      # klippning …) i user-facing strängar. Corevo är multi-bransch — texten ska komma
      # ur terminologi-systemet eller bransch-lagret (bransch-copy.ts), aldrig ur koden.
      # Baseline = scripts/vakt-bransch-baseline.json (58 kända, sanna träffar).
      - run: pnpm --filter web vakt
        if: ${{ !cancelled() }}
      # Kontrast-vakten (goal-62 B3): failar när en malls palett ger osynlig text —
      # knapptext som inte klarar sin egen fyllning, eller brödtext som inte klarar
      # mallens ytor (WCAG 4.5:1). Räknar på tokens, ingen browser. Det fulla sveppet
      # (20 mallar × 5 sidor i riktig webbläsare) körs lokalt: pnpm --filter web kontrast.
      - run: pnpm --filter web vakt:kontrast
        if: ${{ !cancelled() }}
      # next build inlines NEXT_PUBLIC_* at BUILD time (live-blocker #1) — set the
      # production-shaped values so a wrong-host default ("salongen inte tillgänglig")
      # can never ship. Supabase publishable values are safe to expose to the client.
      - run: pnpm build
        if: ${{ !cancelled() }}
        env:
          NEXT_PUBLIC_ROOT_DOMAIN: corevo.se
          NEXT_PUBLIC_PLATFORM_HOST: booking.corevo.se
          NEXT_PUBLIC_SITE_URL: https://booking.corevo.se
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}

  worker-bundle:
    name: Cloudflare Worker gzip budget
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: 5-Kod/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Build OpenNext Worker
        run: pnpm --filter @corevo/web exec opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_ROOT_DOMAIN: corevo.se
          NEXT_PUBLIC_PLATFORM_HOST: booking.corevo.se
          NEXT_PUBLIC_TENANT_MODE: live
          NEXT_PUBLIC_SITE_URL: https://booking.corevo.se
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      - name: Measure minified Worker upload
        run: |
          set -o pipefail
          pnpm --filter @corevo/web exec wrangler deploy --dry-run \
            --outdir "$RUNNER_TEMP/worker-bundle" 2>&1 | tee "$RUNNER_TEMP/wrangler-dry-run.txt"
          node scripts/check-worker-bundle.mjs \
            --input "$RUNNER_TEMP/wrangler-dry-run.txt" \
            --max-gzip-bytes 3145728
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: worker-bundle-measurement
          path: ${{ runner.temp }}/wrangler-dry-run.txt
          retention-days: 30

  e2e:
    name: playwright e2e (staging)
    runs-on: ubuntu-latest
    needs: quality
    if: vars.E2E_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: 5-Kod/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      # Build with STAGING env, then Playwright starts `next start` and runs the
      # full suite (incl. @mutating) against the seeded staging Supabase.
      - run: pnpm build
        env:
          NEXT_PUBLIC_ROOT_DOMAIN: corevo.se
          NEXT_PUBLIC_PLATFORM_HOST: booking.corevo.se
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      - run: pnpm test:e2e
        env:
          E2E_WEBSERVER_CMD: pnpm --filter @corevo/web start
          # Runtime secrets the started app reads server-side.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_ROOT_DOMAIN: corevo.se
          NEXT_PUBLIC_PLATFORM_HOST: booking.corevo.se
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: 5-Kod/playwright-report/
          retention-days: 7

  release-proof:
    name: release proof (all configured gates)
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [database, quality, worker-bundle, e2e]
    steps:
      - name: Require every configured release gate
        working-directory: .
        run: |
          echo "database=${{ needs.database.result }}"
          echo "quality=${{ needs.quality.result }}"
          echo "worker-bundle=${{ needs.worker-bundle.result }}"
          echo "e2e=${{ needs.e2e.result }}"
          [ "${{ needs.database.result }}" = "success" ]
          [ "${{ needs.quality.result }}" = "success" ]
          [ "${{ needs.worker-bundle.result }}" = "success" ]
          [ "${{ needs.e2e.result }}" = "success" ] || { [ "${{ vars.E2E_ENABLED }}" != "true" ] && [ "${{ needs.e2e.result }}" = "skipped" ]; }
