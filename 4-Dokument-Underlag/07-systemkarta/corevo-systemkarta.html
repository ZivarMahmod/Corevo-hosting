<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Corevo — Systemkarta</title>
<style>
  :root{
    --bg:#10141a; --panel:#1a2029; --line:#3a4452; --line-hi:#ffd166; --text:#e8ecf1;
    --c-kund:#34c98e; --c-motor:#4ea3ff; --c-db:#b07cff; --c-salong:#ffd166;
    --c-personal:#ff9f5b; --c-platform:#ff6b81; --c-infra:#8fa3b8; --c-extern:#5bd6d6;
  }
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font:14px/1.4 'Segoe UI',system-ui,sans-serif;overflow:hidden}
  #toolbar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;gap:10px;align-items:center;padding:10px 16px;background:rgba(16,20,26,.92);border-bottom:1px solid var(--line)}
  #toolbar h1{font-size:16px;margin:0 12px 0 0;font-weight:600}
  #toolbar button{background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px}
  #toolbar button:hover{border-color:var(--line-hi)}
  #legend{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto;font-size:12px}
  .lg{display:flex;align-items:center;gap:5px}.lg i{width:12px;height:12px;border-radius:3px;display:inline-block}
  #hint{position:fixed;bottom:10px;left:16px;font-size:12px;color:#7d8b9d;z-index:10}
  #viewport{position:absolute;inset:0;cursor:grab}
  #viewport.dragging{cursor:grabbing}
  #world{position:absolute;transform-origin:0 0}
  svg{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
  path.edge{fill:none;stroke:var(--line);stroke-width:1.6;opacity:.55}
  path.edge.hi{stroke:var(--line-hi);stroke-width:2.6;opacity:1}
  path.edge.dim{opacity:.08}
  .node{position:absolute;width:172px;min-height:46px;padding:8px 10px;border-radius:10px;background:var(--panel);
    border-left:5px solid #888;border-top:1px solid var(--line);border-right:1px solid var(--line);border-bottom:1px solid var(--line);
    cursor:pointer;user-select:none;transition:box-shadow .15s}
  .node:hover{box-shadow:0 0 0 2px var(--line-hi)}
  .node.sel{box-shadow:0 0 0 3px var(--line-hi)}
  .node.dim{opacity:.22}
  .node b{display:block;font-size:13px;font-weight:600}
  .node span{font-size:11px;color:#9fb0c2}
  .node.vilande{border-style:dashed}
  .node.framtid{border-style:dotted;opacity:.75}
  .colhead{position:absolute;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#7d8b9d}
</style>
</head>
<body>
<div id="toolbar">
  <h1>COREVO — systemkarta</h1>
  <button onclick="zoom(1.2)">＋</button><button onclick="zoom(1/1.2)">－</button>
  <button onclick="resetView()">Återställ</button><button onclick="clearSel()">Rensa val</button>
  <div id="legend"></div>
</div>
<div id="hint">Klicka en nod = se allt som går in/ut ur den · dra = panorera · scrolla = zooma · streckad kant = vilande · prickad = framtid</div>
<div id="viewport"><div id="world"><svg id="edges"></svg></div></div>
<script>
const CATS = {
  kund:     {namn:'Kundens värld',   farg:'var(--c-kund)'},
  motor:    {namn:'Bokningsmotor',   farg:'var(--c-motor)'},
  db:       {namn:'Databas',         farg:'var(--c-db)'},
  salong:   {namn:'Salong-admin',    farg:'var(--c-salong)'},
  personal: {namn:'Personal',        farg:'var(--c-personal)'},
  platform: {namn:'Plattform (Zivar)',farg:'var(--c-platform)'},
  infra:    {namn:'Cloudflare-infra',farg:'var(--c-infra)'},
  extern:   {namn:'Externt',         farg:'var(--c-extern)'}
};
// kolumn-x per kategori (rutnät)
const COLX = {kund:40, motor:280, db:520, db2:760, salong:1000, platform:1240, infra:1480, extern:1720};
const ROWH = 78, TOP = 90;
// id, label, undertext, kategori, kolumn, rad, state(live|vilande|framtid)
const NODES = [
 ['storefront','Storefront','kund.corevo.se · 5 teman','kund','kund',0],
 ['boka','/boka-wizard','tjänst→frisör→tid→bekräfta','kund','kund',1],
 ['konto','/konto Mina sidor','bokningar · poäng · historik','kund','kund',2],
 ['avboka','/avboka (token)','gäst-avbokning via mejl-länk','kund','kund',3],
 ['login','Login (alla roller)','Supabase Auth-session','kund','kund',4],

 ['slots','getAvailableSlots','location-aware lediga tider','motor','motor',0],
 ['createbooking','create_public_booking','RPC 10-arg · atomisk','motor','motor',1],
 ['resolvecust','resolve_customer_id','authed/gäst → customers-rad','motor','motor',2],
 ['statustrigger','Status-historik-trigger','varje byte loggas · no-delete','motor','motor',3],
 ['earntrigger','Lojalitet EARN-trigger','completed → +poäng ×1','motor','motor',4],
 ['expirecron','pending-expiry (cron)','städar övergivna pending','motor','motor',5],
 ['remindercron','reminders (cron)','påminnelser inför besök','motor','motor',6],
 ['middleware','Middleware host→tenant','subdomän/egen domän → rätt värld','motor','motor',7],
 ['slotholds','slot_holds','reservation vid betalning','motor','motor',8,'vilande'],

 ['t_tenants','tenants','salonger + status','db','db',0],
 ['t_users','users','konton + roller (app_metadata)','db','db',1],
 ['t_customers','customers','slutkunder per salong','db','db',2],
 ['t_bookings','bookings','bokningar · soft-delete-skydd','db','db',3],
 ['t_history','booking_status_history','auktoritativ status-logg','db','db',4],
 ['t_audit','audit_log','append-only händelselogg','db','db',5],
 ['t_payments','payments','betalrader · refund-spegel','db','db',6,'vilande'],
 ['t_services','services','tjänster + priser (öre)','db','db2',0],
 ['t_staff','staff','frisörer/barberare','db','db2',1],
 ['t_whours','working_hours + slots','scheman per plats','db','db2',2],
 ['t_locations','locations','platser · primär-skydd','db','db2',3],
 ['t_settings','tenant_settings','branding · policy · loyalty-rate','db','db2',4],
 ['t_domains','tenant_domains','kunddomäner · verified','db','db2',5],
 ['t_loyalty','loyalty_ledger','poäng in/ut (earn-only nu)','db','db2',6],
 ['t_roleperm','role_permissions','RBAC-matris (5×7)','db','db2',7],
 ['t_ratelimit','rate_limit_hits','brute-force-skydd · RLS','db','db2',8],

 ['a_dash','Dashboard','KPI · dagens · röd tråd-card','salong','salong',0],
 ['a_book','Bokningar','lista/vecka · drawer · status','salong','salong',1],
 ['a_kund','Kunder','tier · poäng · sök','salong','salong',2],
 ['a_tjanst','Tjänster','+ live sitemap-karta','salong','salong',3],
 ['a_pers','Personal','frisör-kort · KPI','salong','salong',4],
 ['a_schema','Scheman','vecko-grid per plats','salong','salong',5],
 ['a_plats','Platser','multi-location · primär','salong','salong',6],
 ['a_brand','Varumärke','tema · färg · font · media','salong','salong',7],
 ['a_install','Inställningar','öppettider · domän-info','salong','salong',8],
 ['p_idag','Personal: Idag','dagens schema (krasch-bugg!)','personal','salong',9],

 ['z_oversikt','Översikt','plattforms-dashboard','platform','platform',0],
 ['z_salonger','Salonger + DomänPanel','onboarding-stege · egen domän','platform','platform',1],
 ['z_onboard','Onboarda salong','ny tenant-wizard','platform','platform',2],
 ['z_kunder','Kunder (cross-tenant)','+ Lägg till kund-drawer','platform','platform',3],
 ['z_personal','Personal (cross)','all personal alla salonger','platform','platform',4],
 ['z_drift','Drift & logg','audit · rate-limits','platform','platform',5],
 ['z_faktura','Fakturering','per bokning · manuellt underlag','platform','platform',6,'vilande'],
 ['z_integr','Integrationer','Stripe/Google/SMS-status','platform','platform',7,'vilande'],
 ['z_roller','Roller (RBAC)','matris · enforce:ar bara Branding','platform','platform',8],
 ['z_install','Inställningar','plattformsbranding','platform','platform',9],

 ['cf_worker','Worker "bokningsplatformen"','Next.js via OpenNext','infra','infra',0],
 ['cf_domains','custom_domains *.corevo.se','booking · freshcut · corevo.se-guard','infra','infra',1],
 ['cf_saas','CF for SaaS','kunddomäner → cert → live','infra','infra',2],
 ['cf_r2','R2-bucket','salong-bilder · $0 egress','infra','infra',3],
 ['cf_cron','Cron Triggers','reminders + pending-expiry','infra','infra',4],
 ['cf_secrets','Worker-secrets','CF_API_TOKEN · SERVICE_ROLE …','infra','infra',5],

 ['x_auth','Supabase Auth','sessioner · roller i JWT','extern','extern',0],
 ['x_realtime','Supabase Realtime','bookings-kanal → live-uppdatering','extern','extern',1],
 ['x_smtp','one.com SMTP','booking@ · bekräftelser','extern','extern',2],
 ['x_kassa','Kassasystem-adapter','ES API först · rail-agnostisk','extern','extern',3,'framtid'],
 ['x_betal','Swish / Stripe','onlinebetalning + refund','extern','extern',4,'framtid'],
 ['x_sms','46elks SMS','påminnelser (idag bara badge)','extern','extern',5,'framtid'],
 ['x_shop','Shop · Klarna · Instabox','produkter + print + pickup','extern','extern',6,'framtid'],
];
const EDGES = [
 ['storefront','boka'],['storefront','t_settings'],['storefront','t_services'],['middleware','storefront'],
 ['boka','slots'],['boka','createbooking'],['konto','t_bookings'],['konto','t_loyalty'],['avboka','t_bookings'],
 ['login','x_auth'],
 ['slots','t_whours'],['slots','t_bookings'],['slots','t_locations'],
 ['createbooking','t_bookings'],['createbooking','resolvecust'],['createbooking','t_locations'],
 ['resolvecust','t_customers'],
 ['t_bookings','statustrigger'],['statustrigger','t_history'],['statustrigger','t_audit'],
 ['t_bookings','earntrigger'],['earntrigger','t_loyalty'],['earntrigger','t_settings'],
 ['expirecron','t_bookings'],['expirecron','t_payments'],['remindercron','t_bookings'],['remindercron','x_smtp'],
 ['middleware','t_domains'],['middleware','t_tenants'],
 ['a_dash','t_bookings'],['a_book','t_bookings'],['a_kund','t_customers'],['a_kund','t_loyalty'],
 ['a_tjanst','t_services'],['a_pers','t_staff'],['a_schema','t_whours'],['a_plats','t_locations'],
 ['a_brand','t_settings'],['a_brand','cf_r2'],['a_install','t_settings'],
 ['p_idag','t_bookings'],['p_idag','t_whours'],
 ['x_realtime','t_bookings'],['x_realtime','a_dash'],['x_realtime','a_book'],['x_realtime','p_idag'],
 ['z_salonger','t_tenants'],['z_salonger','t_domains'],['z_salonger','cf_saas'],
 ['z_onboard','t_tenants'],['z_onboard','t_users'],['z_kunder','t_customers'],['z_personal','t_staff'],
 ['z_drift','t_audit'],['z_drift','t_ratelimit'],['z_roller','t_roleperm'],['z_roller','a_brand'],
 ['z_faktura','t_bookings'],['z_integr','x_betal'],['z_integr','x_sms'],['z_install','t_settings'],
 ['cf_worker','middleware'],['cf_domains','cf_worker'],['cf_saas','cf_worker'],['cf_cron','expirecron'],
 ['cf_cron','remindercron'],['cf_secrets','cf_worker'],
 ['x_kassa','t_payments'],['x_betal','t_payments'],['x_betal','slotholds'],['slotholds','t_bookings'],
 ['x_shop','x_betal'],['x_sms','remindercron'],['x_auth','t_users'],
];

const world=document.getElementById('world'), svg=document.getElementById('edges'), vp=document.getElementById('viewport');
const pos={};
NODES.forEach(n=>{
  const [id,label,sub,cat,col,row,state]=n;
  const x=COLX[col], y=TOP+row*ROWH;
  pos[id]={x,y,cat};
  const d=document.createElement('div');
  d.className='node'+(state?' '+state:''); d.id='n_'+id;
  d.style.left=x+'px'; d.style.top=y+'px'; d.style.borderLeftColor=CATS[cat].farg;
  d.innerHTML='<b>'+label+'</b><span>'+sub+'</span>';
  d.onclick=e=>{e.stopPropagation();select(id);};
  world.appendChild(d);
});
// kolumnrubriker
const HEADS=[['kund','Kundens värld'],['motor','Bokningsmotor'],['db','Databas A'],['db2','Databas B'],['salong','Salong + Personal'],['platform','Plattform (Zivar)'],['infra','Cloudflare'],['extern','Externt']];
HEADS.forEach(([c,t])=>{const h=document.createElement('div');h.className='colhead';h.style.left=COLX[c]+'px';h.style.top=(TOP-34)+'px';h.textContent=t;world.appendChild(h);});
// legend
document.getElementById('legend').innerHTML=Object.values(CATS).map(c=>'<div class="lg"><i style="background:'+c.farg+'"></i>'+c.namn+'</div>').join('');
// kanter
function draw(){
  const W=2000,H=TOP+12*ROWH; svg.setAttribute('width',W);svg.setAttribute('height',H);
  svg.innerHTML=EDGES.map(([a,b],i)=>{
    const A=pos[a],B=pos[b]; if(!A||!B) return '';
    const ax=A.x+(A.x<B.x?172:0), ay=A.y+24, bx=B.x+(B.x<A.x?172:0), by=B.y+24;
    const mx=(ax+bx)/2;
    return '<path class="edge" id="e_'+i+'" d="M'+ax+' '+ay+' C'+mx+' '+ay+', '+mx+' '+by+', '+bx+' '+by+'"/>';
  }).join('');
}
draw();
// urval
let sel=null;
function select(id){
  sel=id;
  const linked=new Set([id]);
  EDGES.forEach(([a,b],i)=>{
    const hit=(a===id||b===id);
    const e=document.getElementById('e_'+i);
    e.classList.toggle('hi',hit); e.classList.toggle('dim',!hit);
    if(hit){linked.add(a);linked.add(b);}
  });
  NODES.forEach(n=>{
    const d=document.getElementById('n_'+n[0]);
    d.classList.toggle('sel',n[0]===id);
    d.classList.toggle('dim',!linked.has(n[0]));
  });
}
function clearSel(){
  sel=null;
  document.querySelectorAll('.edge').forEach(e=>e.classList.remove('hi','dim'));
  document.querySelectorAll('.node').forEach(d=>d.classList.remove('sel','dim'));
}
vp.addEventListener('click',clearSel);
// pan + zoom
let scale=.85, tx=20, ty=20, drag=null;
function apply(){world.style.transform='translate('+tx+'px,'+ty+'px) scale('+scale+')';}
function zoom(f){scale=Math.min(2,Math.max(.3,scale*f));apply();}
function resetView(){scale=.85;tx=20;ty=20;apply();}
vp.addEventListener('mousedown',e=>{drag={x:e.clientX-tx,y:e.clientY-ty};vp.classList.add('dragging');});
window.addEventListener('mousemove',e=>{if(drag){tx=e.clientX-drag.x;ty=e.clientY-drag.y;apply();}});
window.addEventListener('mouseup',()=>{drag=null;vp.classList.remove('dragging');});
vp.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY<0?1.1:1/1.1);},{passive:false});
apply();
</script>
</body>
</html>
