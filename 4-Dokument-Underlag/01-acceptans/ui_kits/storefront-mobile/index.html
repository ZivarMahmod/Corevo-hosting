<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Corevo Storefront — 5 stilar på mobil</title>
<style> * { box-sizing: border-box; } html, body { margin: 0; padding: 0; height: 100%; font-family: 'Inter', system-ui, sans-serif; } </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../design-canvas.jsx"></script>
<script type="text/babel">
const THEMES = [
  ["salvia", "Studio Salvia", "Full-bleed foto-hero, salvia"],
  ["leander", "Maison Leander", "Centrerad, symmetrisk, lavendel"],
  ["zigge", "Zigge", "Split-hero, mörk barber, bärnsten"],
  ["linnea", "Salong Linnea", "Sida-vid-sida, varm naturlig"],
  ["edit", "Edit", "Asymmetrisk, redaktionell, kol"],
];

function Phone({ theme }) {
  return (
    <div style={{ width: 412, height: 820, borderRadius: 46, background: "#111", padding: 11, boxShadow: "0 30px 70px rgba(0,0,0,.22)" }}>
      <div style={{ position: "relative", width: "100%", height: "100%", borderRadius: 36, overflow: "hidden", background: "#fff" }}>
        <iframe title={theme} src={`../storefront/index.html?theme=${theme}&solo=1`} style={{ width: 390, height: 798, border: 0, display: "block" }} />
        <div style={{ position: "absolute", top: 9, left: "50%", transform: "translateX(-50%)", width: 92, height: 22, background: "#111", borderRadius: 999, pointerEvents: "none" }} />
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="mobil" title="Storefront — 5 stilar på mobil" subtitle="Samma salongsdata, fem helt olika layouter (varje modellerad på en riktig svensk salongssajt). Varje telefon är den riktiga sidan — scrolla och tryck 'Boka tid' för det inbäddade flödet. 60–99% av bokningarna sker på mobil.">
        {THEMES.map(([id, name, sub]) => (
          <DCArtboard key={id} id={id} label={name + " — " + sub} width={412} height={820}>
            <Phone theme={id} />
          </DCArtboard>
        ))}
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
